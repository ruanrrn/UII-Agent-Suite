<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>VitalLens</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --accent: #0099cc;
        --accent2: #4a6cf7;
        --green: #10b981;
        --red: #ef4444;
        --yellow: #f59e0b;
        --bg: #f0f4f8;
        --surface: #ffffff;
        --border: #e2e8f0;
        --border2: #cbd5e1;
        --text: #1e293b;
        --text2: #475569;
        --muted: #94a3b8;
        --dim: #cbd5e1;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family:
          -apple-system, "Segoe UI", "PingFang SC", "Microsoft YaHei",
          sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: clamp(12px, 2vw, 28px);
        overflow: auto;
      }

      /* subtle dot grid */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image: radial-gradient(
          circle,
          #4a6cf720 1px,
          transparent 1px
        );
        background-size: 24px 24px;
        pointer-events: none;
      }

      /* ── layout ── */
      .container {
        position: relative;
        width: min(92vw, clamp(520px, 56vw, 960px));
        max-height: calc(100vh - clamp(24px, 4vw, 56px));
        display: flex;
        flex-direction: column;
        gap: clamp(0.7rem, 1vw, 1rem);
        z-index: 1;
        padding: clamp(0.3rem, 0.8vh, 0.75rem) 0;
      }

      /* ── header ── */
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0.55rem 0.8rem;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        box-shadow: 0 1px 4px #0000000a;
      }
      .logo {
        display: flex;
        align-items: center;
        gap: 0.55rem;
        font-size: 0.9rem;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--accent2);
      }
      .logo-dot {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: var(--green);
        box-shadow: 0 0 8px var(--green);
        animation: glow 2s ease-in-out infinite;
      }
      @keyframes glow {
        0%,
        100% {
          opacity: 1;
          box-shadow: 0 0 8px var(--green);
        }
        50% {
          opacity: 0.5;
          box-shadow: 0 0 4px var(--green);
        }
      }
      .header-right {
        display: flex;
        align-items: center;
        gap: 0.8rem;
        font-size: 0.78rem;
        color: var(--muted);
        font-variant-numeric: tabular-nums;
      }
      .header-badge {
        padding: 0.18rem 0.55rem;
        border-radius: 5px;
        border: 1px solid var(--border2);
        font-size: 0.68rem;
        letter-spacing: 0.08em;
        color: var(--muted);
        background: var(--bg);
      }

      /* ── camera card ── */
      .camera-card {
        position: relative;
        border-radius: 14px;
        overflow: hidden;
        border: 1px solid var(--border);
        background: #1a1a2e;
        box-shadow: 0 4px 20px #0000001a;
      }
      #preview {
        width: 100%;
        aspect-ratio: 16/9;
        object-fit: cover;
        display: block;
        background: #111;
      }

      /* HUD top-left */
      .hud-tl {
        position: absolute;
        top: 11px;
        left: 11px;
        display: flex;
        gap: 0.4rem;
        align-items: center;
      }
      .badge {
        padding: 0.18rem 0.5rem;
        border-radius: 5px;
        font-size: 0.68rem;
        font-family: monospace;
        letter-spacing: 0.05em;
        font-weight: 600;
        backdrop-filter: blur(8px);
        border: 1px solid;
      }
      .badge-codec {
        background: rgba(74, 108, 247, 0.18);
        border-color: rgba(74, 108, 247, 0.4);
        color: #a5b4fc;
      }
      .badge-res {
        background: rgba(0, 0, 0, 0.45);
        border-color: rgba(255, 255, 255, 0.15);
        color: #94a3b8;
      }
      .badge-fps {
        background: rgba(0, 0, 0, 0.45);
        border-color: rgba(255, 255, 255, 0.15);
        color: #64748b;
      }

      /* HUD REC */
      .hud-tr {
        position: absolute;
        top: 11px;
        right: 11px;
      }
      .rec-badge {
        display: none;
        align-items: center;
        gap: 0.35rem;
        padding: 0.22rem 0.65rem;
        border-radius: 20px;
        background: rgba(239, 68, 68, 0.18);
        border: 1px solid rgba(239, 68, 68, 0.45);
        font-size: 0.68rem;
        letter-spacing: 0.1em;
        color: #fca5a5;
        font-weight: 700;
        backdrop-filter: blur(6px);
      }
      .rec-badge.active {
        display: flex;
      }
      .rec-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--red);
        animation: blink 1s step-end infinite;
      }
      @keyframes blink {
        50% {
          opacity: 0;
        }
      }

      /* HUD bottom */
      .hud-bottom {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        padding: 0.55rem 0.75rem 0.5rem;
        background: linear-gradient(transparent, rgba(0, 0, 0, 0.7));
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
      }
      .hud-frames {
        font-size: 0.72rem;
        font-family: monospace;
        color: #94a3b8;
        display: flex;
        flex-direction: column;
        gap: 0.08rem;
      }
      .hud-frames .frame-val {
        font-size: 0.92rem;
        color: #e2e8f0;
        font-weight: 600;
      }
      .hud-elapsed {
        font-size: 1.4rem;
        font-family: monospace;
        font-weight: 300;
        color: #fff;
        letter-spacing: 0.03em;
      }

      /* frame bar */
      .frame-bar-wrap {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 3px;
        background: rgba(255, 255, 255, 0.08);
      }
      .frame-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, var(--accent2), var(--accent));
        transition: width 0.25s ease;
      }

      /* scan line */
      .scan-line {
        position: absolute;
        left: 0;
        right: 0;
        height: 1px;
        top: -2px;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(0, 200, 150, 0.5),
          transparent
        );
        display: none;
      }
      .scan-line.active {
        display: block;
        animation: scan 2.2s linear infinite;
      }
      @keyframes scan {
        0% {
          top: 0;
        }
        100% {
          top: 100%;
        }
      }

      /* brackets */
      .brk {
        position: absolute;
        width: 18px;
        height: 18px;
        pointer-events: none;
      }
      .brk--tl {
        top: 9px;
        left: 9px;
        border-top: 1.5px solid rgba(74, 108, 247, 0.5);
        border-left: 1.5px solid rgba(74, 108, 247, 0.5);
      }
      .brk--tr {
        top: 9px;
        right: 9px;
        border-top: 1.5px solid rgba(74, 108, 247, 0.5);
        border-right: 1.5px solid rgba(74, 108, 247, 0.5);
      }
      .brk--bl {
        bottom: 9px;
        left: 9px;
        border-bottom: 1.5px solid rgba(74, 108, 247, 0.5);
        border-left: 1.5px solid rgba(74, 108, 247, 0.5);
      }
      .brk--br {
        bottom: 9px;
        right: 9px;
        border-bottom: 1.5px solid rgba(74, 108, 247, 0.5);
        border-right: 1.5px solid rgba(74, 108, 247, 0.5);
      }

      /* countdown */
      .countdown-ov {
        position: absolute;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        background: rgba(10, 10, 20, 0.6);
        backdrop-filter: blur(3px);
        font-size: 6rem;
        font-weight: 100;
        color: #fff;
        text-shadow: 0 0 60px var(--accent2);
        letter-spacing: -0.04em;
      }
      .countdown-ov.active {
        display: flex;
      }

      /* ── ECG strip ── */
      .ecg-wrap {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 0.5rem 0.75rem;
        display: flex;
        align-items: center;
        gap: 0.65rem;
        height: 60px;
        overflow: hidden;
        box-shadow: 0 1px 3px #0000000a;
      }
      .ecg-label {
        font-size: 0.65rem;
        font-family: monospace;
        letter-spacing: 0.1em;
        color: var(--muted);
        white-space: nowrap;
        flex-shrink: 0;
        text-transform: uppercase;
      }
      .ecg-svg-wrap {
        flex: 1;
        height: 100%;
        overflow: hidden;
      }
      svg.ecg {
        width: 200%;
        height: 100%;
      }
      svg.ecg.running {
        animation: scroll-ecg 3s linear infinite;
      }
      @keyframes scroll-ecg {
        from {
          transform: translateX(0);
        }
        to {
          transform: translateX(-50%);
        }
      }
      .ecg-line {
        stroke: var(--accent);
        stroke-width: 1.8;
        fill: none;
      }
      .ecg-idle {
        stroke: var(--dim);
        stroke-width: 1;
        fill: none;
      }

      /* ── stats row ── */
      .stats-row {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 0.6rem;
      }
      .stat-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 0.55rem 0.7rem;
        display: flex;
        flex-direction: column;
        gap: 0.18rem;
        box-shadow: 0 1px 3px #0000000a;
      }
      .stat-label {
        font-size: 0.62rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--muted);
        font-weight: 600;
      }
      .stat-val {
        font-size: 0.98rem;
        font-family: monospace;
        color: var(--text);
        font-weight: 600;
      }
      .stat-val.accent {
        color: var(--accent2);
      }
      .stat-val.muted {
        color: var(--text2);
        font-size: 0.82rem;
      }

      /* ── status bar ── */
      .status-wrap {
        display: flex;
        align-items: center;
        gap: 0.6rem;
        padding: 0.45rem 0.75rem;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 10px;
        min-height: 2.2rem;
        box-shadow: 0 1px 3px #0000000a;
      }
      .status-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        flex-shrink: 0;
        background: var(--dim);
        transition: background 0.3s;
      }
      .status-dot.active {
        background: var(--green);
        box-shadow: 0 0 7px var(--green);
      }
      .status-dot.error {
        background: var(--red);
        box-shadow: 0 0 7px var(--red);
      }
      .status-dot.done {
        background: var(--accent);
        box-shadow: 0 0 7px var(--accent);
      }
      #status {
        font-size: 0.85rem;
        color: var(--text2);
        letter-spacing: 0.02em;
        flex: 1;
        transition: color 0.3s;
      }
      #status.active {
        color: var(--green);
      }
      #status.error {
        color: var(--red);
      }
      #status.done {
        color: var(--accent);
      }

      /* ── results ── */
      #results {
        display: none;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        overflow: hidden;
        animation: fadeUp 0.35s ease;
        box-shadow: 0 2px 12px #0000001a;
      }
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }
      .results-header {
        padding: 0.5rem 0.9rem;
        background: linear-gradient(90deg, #4a6cf708, #0099cc08);
        border-bottom: 1px solid var(--border);
        font-size: 0.65rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--muted);
        font-weight: 700;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .results-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
      }
      .result-item {
        padding: 1rem 1.1rem;
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        gap: 0.3rem;
      }
      .result-item:last-child {
        border-right: 0;
      }
      .r-name {
        font-size: 0.8rem;
        color: var(--text2);
        font-weight: 600;
      }
      .r-name-en {
        font-size: 0.68rem;
        color: var(--muted);
      }
      .r-value {
        font-size: 2.6rem;
        font-weight: 300;
        font-variant-numeric: tabular-nums;
        letter-spacing: -0.03em;
        color: var(--accent2);
        line-height: 1;
      }
      .r-value.warn {
        color: var(--yellow);
      }
      .r-unit {
        font-size: 0.8rem;
        color: var(--muted);
        margin-left: 0.2rem;
      }
      .r-conf {
        font-size: 0.68rem;
        color: var(--muted);
        border: 1px solid var(--border2);
        border-radius: 8px;
        padding: 0.12rem 0.45rem;
        display: inline-block;
        align-self: flex-start;
        background: var(--bg);
      }
      .r-conf.warn {
        color: var(--yellow);
        border-color: #92400e44;
        background: #fef3c710;
      }

      /* ── no-key ── */
      .no-key {
        display: none;
        padding: 1rem 1.1rem;
        background: #fef2f2;
        border: 1px solid #fecaca;
        border-radius: 12px;
        text-align: center;
      }
      .no-key.active {
        display: block;
      }
      .no-key p {
        font-size: 0.88rem;
        color: #b91c1c;
        line-height: 1.7;
      }
      .no-key code {
        font-family: monospace;
        font-size: 0.8rem;
        color: #dc2626;
        background: #fee2e2;
        padding: 0.1em 0.4em;
        border-radius: 4px;
      }

      /* ── disclaimer ── */
      .disclaimer {
        text-align: center;
        font-size: 0.68rem;
        color: var(--muted);
        letter-spacing: 0.04em;
        line-height: 1.6;
      }

      @media (max-width: 720px) {
        body {
          padding: 12px;
          align-items: flex-start;
        }

        .container {
          width: 100%;
          max-height: none;
        }

        .stats-row {
          grid-template-columns: repeat(2, 1fr);
        }

        .hud-bottom {
          padding: 0.45rem 0.6rem;
        }

        .hud-elapsed {
          font-size: 1.1rem;
        }

        .result-item {
          padding: 0.85rem 0.9rem;
        }

        .r-value {
          font-size: 2.1rem;
        }
      }

      @media (min-width: 1600px) {
        .container {
          width: min(84vw, 1080px);
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <!-- header -->
      <header>
        <div class="logo">
          <div class="logo-dot"></div>
          VitalLens
        </div>
        <div class="header-right">
          <span class="header-badge">rPPG</span>
          <span id="clock">--:--:--</span>
        </div>
      </header>

      <!-- camera card -->
      <div class="camera-card">
        <video id="preview" autoplay muted playsinline></video>

        <div class="hud-tl">
          <span class="badge badge-codec" id="codecBadge">VP8</span>
          <span class="badge badge-res" id="resBadge">–×–</span>
          <span class="badge badge-fps" id="fpsBadge">– fps</span>
        </div>
        <div class="hud-tr">
          <div class="rec-badge" id="recBadge">
            <div class="rec-dot"></div>
            REC
          </div>
        </div>
        <div class="hud-bottom">
          <div class="hud-frames">
            <span class="frame-val"><span id="frameCount">0</span> frames</span>
            <span>target <span id="frameTarget">350</span></span>
          </div>
          <div class="hud-elapsed" id="elapsed">0.0s</div>
        </div>
        <div class="frame-bar-wrap">
          <div class="frame-bar" id="frameBar"></div>
        </div>
        <div class="scan-line" id="scanLine"></div>
        <div class="brk brk--tl"></div>
        <div class="brk brk--tr"></div>
        <div class="brk brk--bl"></div>
        <div class="brk brk--br"></div>
        <div class="countdown-ov" id="countdownOv"></div>
      </div>

      <!-- ECG strip -->
      <div class="ecg-wrap">
        <div class="ecg-label">ECG · rPPG</div>
        <div class="ecg-svg-wrap">
          <svg
            class="ecg"
            id="ecgSvg"
            viewBox="0 0 800 40"
            preserveAspectRatio="none"
          >
            <polyline id="ecgLine" class="ecg-idle" points="0,20 800,20" />
          </svg>
        </div>
      </div>

      <!-- stats -->
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-label">FPS</div>
          <div class="stat-val accent" id="statFps">–</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Codec</div>
          <div class="stat-val muted" id="statCodec">–</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Frames</div>
          <div class="stat-val" id="statFrames">–</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Blob</div>
          <div class="stat-val muted" id="statBlob">–</div>
        </div>
      </div>

      <!-- status -->
      <div class="status-wrap">
        <div class="status-dot" id="statusDot"></div>
        <div id="status">正在初始化…</div>
      </div>

      <!-- results -->
      <div id="results"></div>

      <!-- no key -->
      <div class="no-key" id="noKeyMsg">
        <p>
          未检测到 API Key。<br />
          此页面须通过 <code>agent</code> 调用脚本启动，不支持直接访问。
        </p>
      </div>

      <p class="disclaimer">
        仅供研究用途 &nbsp;·&nbsp; Research use only &nbsp;·&nbsp; Not a medical
        device
      </p>
    </div>

    <script type="module">
      import { VitalLens } from "./vitallens.browser.js";
      import {
        patchWebmDuration,
        patchWebmDefaultDuration,
      } from "./webm-duration-fix.js";

      let API_KEY =
        new URLSearchParams(location.hash.slice(1)).get("key") || "";
      const TARGET_FRAMES = 350;
      const MAX_WAIT_MS = 60000;
      const CONFIDENCE_WARN = 0.7;
      const AUTO_CLOSE_DELAY = 3000;
      const REC_FPS = 30;

      const preview = document.getElementById("preview");
      const statusEl = document.getElementById("status");
      const statusDot = document.getElementById("statusDot");
      const resultsEl = document.getElementById("results");
      const scanLine = document.getElementById("scanLine");
      const recBadge = document.getElementById("recBadge");
      const countdownOv = document.getElementById("countdownOv");
      const frameBar = document.getElementById("frameBar");
      const frameCount = document.getElementById("frameCount");
      const elapsedEl = document.getElementById("elapsed");
      const resBadge = document.getElementById("resBadge");
      const fpsBadge = document.getElementById("fpsBadge");
      const statFps = document.getElementById("statFps");
      const statCodec = document.getElementById("statCodec");
      const statFrames = document.getElementById("statFrames");
      const statBlob = document.getElementById("statBlob");
      const noKeyMsg = document.getElementById("noKeyMsg");
      const ecgSvg = document.getElementById("ecgSvg");
      const ecgLine = document.getElementById("ecgLine");
      const clock = document.getElementById("clock");

      setInterval(() => {
        clock.textContent = new Date().toLocaleTimeString("zh-CN", {
          hour12: false,
        });
      }, 1000);

      // ECG waveform
      function buildEcg(n = 14) {
        const cycle = [
          [0, 20],
          [30, 20],
          [35, 17],
          [38, 23],
          [40, 20],
          [48, 20],
          [50, 1],
          [52, 38],
          [55, 20],
          [70, 24],
          [80, 20],
          [120, 20],
        ];
        let pts = "";
        for (let i = 0; i < n; i++) {
          cycle.forEach(([x, y]) => {
            pts += `${x + i * 120},${y} `;
          });
        }
        return pts.trim();
      }
      function startEcg() {
        ecgLine.setAttribute("points", buildEcg(14));
        ecgLine.setAttribute("class", "ecg-line");
        ecgSvg.setAttribute("viewBox", "0 0 840 40");
        ecgSvg.classList.add("running");
      }
      function stopEcg() {
        ecgSvg.classList.remove("running");
        ecgLine.setAttribute("class", "ecg-idle");
        ecgLine.setAttribute("points", "0,20 800,20");
        ecgSvg.setAttribute("viewBox", "0 0 800 40");
      }

      function setStatus(msg, cls = "") {
        statusEl.textContent = msg;
        statusEl.className = cls;
        statusDot.className = "status-dot" + (cls ? " " + cls : "");
      }
      function reportError(err) {
        const body = (err && err.stack) || (err && err.message) || String(err);
        return fetch("/save?name=error.txt", { method: "POST", body }).catch(
          () => {},
        );
      }

      async function countDecodedFrames(blob) {
        const video = document.createElement("video");
        const objectUrl = URL.createObjectURL(blob);
        video.muted = true;
        video.playsInline = true;
        video.preload = "auto";
        video.src = objectUrl;

        try {
          await new Promise((resolve, reject) => {
            video.onloadeddata = () => resolve();
            video.onerror = () =>
              reject(new Error("无法加载录制结果用于帧数校验"));
          });

          if (typeof video.requestVideoFrameCallback !== "function") {
            const duration = Number.isFinite(video.duration)
              ? video.duration
              : 0;
            const estimated = Math.round(duration * REC_FPS);
            return estimated > 0 ? estimated : null;
          }

          let decodedFrames = 0;
          await new Promise((resolve, reject) => {
            video.onended = () => resolve();
            video.onerror = () =>
              reject(new Error("录制结果回放失败，无法统计实际帧数"));

            function onFrame(_now, metadata) {
              const presentedFrames = metadata?.presentedFrames;
              if (typeof presentedFrames === "number") {
                decodedFrames = Math.max(decodedFrames, presentedFrames);
              } else {
                decodedFrames++;
              }

              if (!video.ended) {
                video.requestVideoFrameCallback(onFrame);
              }
            }

            video.requestVideoFrameCallback(onFrame);
            video.play().catch(reject);
          });

          return decodedFrames || null;
        } finally {
          video.pause();
          video.removeAttribute("src");
          video.load();
          URL.revokeObjectURL(objectUrl);
        }
      }

      async function buildAlignedRecordingBlob(
        rawBlob,
        frameIntervalMs,
        recordedFrames,
      ) {
        const fpsValue = 1000 / frameIntervalMs;

        async function patchBlob(frameCount) {
          const durationMs = Math.max(
            frameIntervalMs,
            frameCount * frameIntervalMs,
          );
          let blob = await patchWebmDuration(rawBlob, durationMs);
          blob = await patchWebmDefaultDuration(blob, fpsValue);
          return blob;
        }

        const initiallyPatchedBlob = await patchBlob(recordedFrames);
        const decodedFrames = await countDecodedFrames(initiallyPatchedBlob);
        const alignedFrames =
          decodedFrames && decodedFrames > 0
            ? Math.min(recordedFrames, decodedFrames)
            : recordedFrames;

        if (alignedFrames === recordedFrames) {
          return { blob: initiallyPatchedBlob, alignedFrames, decodedFrames };
        }

        const alignedBlob = await patchBlob(alignedFrames);
        return { blob: alignedBlob, alignedFrames, decodedFrames };
      }

      async function openCamera() {
        const s = await navigator.mediaDevices.getUserMedia({
          video: {
            width: { ideal: 1280 },
            height: { ideal: 720 },
            frameRate: { ideal: REC_FPS },
          },
          audio: false,
        });
        preview.srcObject = s;
        await preview.play();
        const t = s.getVideoTracks()[0].getSettings();
        window._frameDiag = `raw:${t.width}×${t.height}@${t.frameRate}fps`;
        resBadge.textContent = `${t.width}×${t.height}`;
        fpsBadge.textContent = `${Math.round(t.frameRate)} fps`;
        statFps.textContent = Math.round(t.frameRate);
        return s;
      }

      async function recordAndAnalyze(stream) {
        for (let n = 3; n > 0; n--) {
          countdownOv.textContent = n;
          countdownOv.classList.add("active");
          setStatus(`准备开始：${n}`);
          await new Promise((r) => setTimeout(r, 1000));
        }
        countdownOv.classList.remove("active");

        recBadge.classList.add("active");
        scanLine.classList.add("active");
        startEcg();

        const mime =
          ["video/webm;codecs=vp8", "video/webm"].find((m) =>
            MediaRecorder.isTypeSupported(m),
          ) || "";
        const recorder = new MediaRecorder(
          stream,
          mime ? { mimeType: mime } : {},
        );
        statCodec.textContent = mime.includes("vp8") ? "VP8" : "WebM";

        const chunks = [];
        recorder.addEventListener("dataavailable", (e) => {
          if (e.data?.size) chunks.push(e.data);
        });
        const stopped = new Promise((r) =>
          recorder.addEventListener("stop", r),
        );

        const camS = stream.getVideoTracks()[0].getSettings();
        const t0 = performance.now();
        recorder.start(200);

        // Use presentedFrames so callback throttling does not undercount frames.
        let actualFrames = 0;
        let initialPresentedFrames = null;
        await new Promise((resolve) => {
          function onFrame(_now, metadata) {
            const presentedFrames = metadata?.presentedFrames;
            if (typeof presentedFrames === "number") {
              if (initialPresentedFrames === null) {
                initialPresentedFrames = presentedFrames;
              }
              actualFrames = Math.max(
                actualFrames,
                presentedFrames - initialPresentedFrames + 1,
              );
            } else {
              actualFrames++;
            }

            const el = performance.now() - t0;
            frameBar.style.width =
              Math.min(100, (actualFrames / TARGET_FRAMES) * 100) + "%";
            frameCount.textContent = actualFrames;
            elapsedEl.textContent = (el / 1000).toFixed(1) + "s";
            setStatus(
              `录制中 · ${actualFrames} / ${TARGET_FRAMES} 帧 · 请保持不动`,
              "active",
            );

            if (actualFrames >= TARGET_FRAMES || el >= MAX_WAIT_MS) {
              resolve();
              return;
            }
            preview.requestVideoFrameCallback(onFrame);
          }
          preview.requestVideoFrameCallback(onFrame);
        });

        const captureMs = performance.now() - t0;
        recorder.stop();
        await stopped;
        frameBar.style.width = "100%";
        recBadge.classList.remove("active");
        scanLine.classList.remove("active");
        stopEcg();

        const rawBlob = new Blob(chunks, {
          type: recorder.mimeType || "video/webm",
        });
        statBlob.textContent = (rawBlob.size / 1024).toFixed(0) + " KB";

        setStatus("修正容器元数据…");
        const totalFrames = actualFrames;
        const frameIntervalMs =
          totalFrames > 1 ? captureMs / (totalFrames - 1) : 1000 / REC_FPS;
        statFrames.textContent = `${totalFrames}`;

        let fixedBlob;
        let effectiveFrames = totalFrames;
        let decodedFrames = null;
        try {
          const aligned = await buildAlignedRecordingBlob(
            rawBlob,
            frameIntervalMs,
            totalFrames,
          );
          fixedBlob = aligned.blob;
          effectiveFrames = aligned.alignedFrames;
          decodedFrames = aligned.decodedFrames;
          statFrames.textContent =
            effectiveFrames === totalFrames
              ? `${totalFrames}`
              : `${totalFrames} -> ${effectiveFrames}`;
        } catch (e) {
          throw new Error(`WebM patch: ${e.message}`);
        }

        const file = new File([fixedBlob], "capture.webm", {
          type: fixedBlob.type,
        });

        scanLine.classList.add("active");
        setStatus("上传 VitalLens API 分析中…");
        const apiResult = await vl.processVideoFile(file);
        scanLine.classList.remove("active");

        apiResult.capture_meta = {
          camera_w: camS.width,
          camera_h: camS.height,
          frames: effectiveFrames,
          elapsed_ms: Math.round(captureMs),
          recorded_frames: totalFrames,
          decoded_frames: decodedFrames,
          target_frames: TARGET_FRAMES,
          mime: fixedBlob.type,
          blob_size: fixedBlob.size,
        };
        return apiResult;
      }

      function getVital(r, name) {
        return (
          r?.vitals?.[name] ?? r?.[name] ?? r?.results?.[0]?.vitals?.[name]
        );
      }
      function showResults(r) {
        const hr = getVital(r, "heart_rate");
        const rr = getVital(r, "respiratory_rate");
        const mkItem = (m, unit, name, nameEn) => {
          if (!m || typeof m.value !== "number") return "";
          const c = m.confidence ?? 0,
            warn = c < CONFIDENCE_WARN;
          return `<div class="result-item">
            <div><div class="r-name">${name}</div><div class="r-name-en">${nameEn}</div></div>
            <div><span class="r-value${warn ? " warn" : ""}">${m.value.toFixed(1)}</span><span class="r-unit">${unit}</span></div>
            <div class="r-conf${warn ? " warn" : ""}">${c.toFixed(2)}${warn ? " ⚠" : ""}</div>
          </div>`;
        };
        const rows = [
          mkItem(hr, "bpm", "心率", "Heart Rate"),
          mkItem(rr, "rpm", "呼吸率", "Resp. Rate"),
        ]
          .filter(Boolean)
          .join("");
        if (rows) {
          resultsEl.innerHTML = `<div class="results-header"><span>测量结果</span><span>${new Date().toLocaleTimeString()}</span></div><div class="results-grid">${rows}</div>`;
          resultsEl.style.display = "block";
        }
        setStatus("测量完成 · 窗口即将关闭", "done");
      }

      let vl = null,
        stream = null;

      async function measure() {
        try {
          setStatus("初始化 VitalLens SDK…");
          vl = new VitalLens({ method: "vitallens", apiKey: API_KEY });

          setStatus("打开摄像头…");
          stream = await openCamera();

          const result = await recordAndAnalyze(stream);

          await fetch("/save?name=result.json", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(result, null, 2),
          }).catch(() => {});

          showResults(result);
          setTimeout(() => {
            try {
              window.close();
            } catch {}
          }, AUTO_CLOSE_DELAY);
        } catch (err) {
          console.error(err);
          const camS = stream?.getVideoTracks()[0]?.getSettings();
          const diag = [
            camS ? `camera:${camS.width}×${camS.height}` : "",
            window._frameDiag || "",
          ]
            .filter(Boolean)
            .join(" | ");
          setStatus(`错误：${err.message || err}`, "error");
          scanLine.classList.remove("active");
          recBadge.classList.remove("active");
          stopEcg();
          await reportError(
            (err.stack || err.message || String(err)) + `\n[${diag}]`,
          );
        }
      }

      if (!API_KEY) {
        noKeyMsg.classList.add("active");
        setStatus("请通过 agent 调用脚本启动", "error");
        reportError("No API key — must be launched via agent script.");
      } else {
        setTimeout(() => measure(), 600);
      }
    </script>
  </body>
</html>
